name: Build Local AI Workbench
run-name: Local AI Workbench #${{ github.run_number }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-local-ai-workbench.yml"
      - ".applab/local-ai-workbench-request.json"

permissions:
  contents: write
  issues: write

concurrency:
  group: local-ai-workbench-integration
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TARGET_REF: local-ai-workbench
      GODOT_VERSION: "4.5.1"
      GODOT_TEMPLATE_VERSION: "4.5.1.stable"
      ANDROID_NDK_VERSION: "28.1.13356709"
      ANDROID_CMAKE_VERSION: "3.22.1"

    steps:
      - name: Create or find build status issue
        id: issue
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Local AI Workbench build status"
          number="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number,title --jq '.[] | select(.title == "Local AI Workbench build status") | .number' | head -n 1)"
          if [[ -z "$number" ]]; then
            url="$(gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "Automated build results for the local-ai-workbench branch." --assignee xonoxo143-ux)"
            number="${url##*/}"
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 1

      - name: Validate model catalogue
        run: python3 scripts/validate_catalog.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmdline-tools;latest" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build Android plugin
        shell: bash
        run: |
          gradle -p android-plugin --no-daemon :plugin:assembleDebug :plugin:assembleRelease --stacktrace
          mkdir -p app/addons/LocalAI/bin/debug app/addons/LocalAI/bin/release
          cp android-plugin/plugin/build/outputs/aar/LocalAI-debug.aar app/addons/LocalAI/bin/debug/
          cp android-plugin/plugin/build/outputs/aar/LocalAI-release.aar app/addons/LocalAI/bin/release/

      - name: Download Godot and matching templates
        shell: bash
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d templates-temp
          cp -r templates-temp/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Create Android debug key
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "$HOME/.android/debug.keystore" \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000

      - name: Import and export Godot APK
        shell: bash
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /home/runner/.android/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p app/build
          godot --headless --path app --import
          godot --headless --verbose --path app \
            --install-android-build-template \
            --export-debug "Android" "build/LocalAIWorkbench-debug.apk"
          test -f app/build/LocalAIWorkbench-debug.apk
          unzip -t app/build/LocalAIWorkbench-debug.apk

      - name: Package build
        id: package
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/LocalAIWorkbench-debug.apk dist/LocalAIWorkbench-debug-latest.apk
          cp app/addons/LocalAI/bin/debug/LocalAI-debug.aar dist/
          cp app/addons/LocalAI/bin/release/LocalAI-release.aar dist/
          sha256sum dist/LocalAIWorkbench-debug-latest.apk > dist/LocalAIWorkbench-debug-latest.apk.sha256
          echo "apk_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/local-ai-workbench-latest/LocalAIWorkbench-debug-latest.apk" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalAIWorkbench-Android-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest APK release
        uses: ncipollo/release-action@v1
        with:
          tag: local-ai-workbench-latest
          commit: ${{ env.TARGET_REF }}
          name: Local AI Workbench Latest
          body: |
            Automated debug build from `local-ai-workbench`.

            Source commit: `${{ github.sha }}`
            Build run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          prerelease: true
          allowUpdates: true
          updateOnlyUnreleased: true
          replacesArtifacts: true
          artifacts: "dist/*"

      - name: Report build result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [[ -z "${ISSUE_NUMBER:-}" ]]; then
            exit 0
          fi
          cat > "$RUNNER_TEMP/build-result.md" <<EOF
          Build status: **${JOB_STATUS}**

          Branch: \`${TARGET_REF}\`
          Target commit: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          if [[ "$JOB_STATUS" == "success" ]]; then
            cat >> "$RUNNER_TEMP/build-result.md" <<EOF
          APK: https://github.com/${GITHUB_REPOSITORY}/releases/download/local-ai-workbench-latest/LocalAIWorkbench-debug-latest.apk
          EOF
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$RUNNER_TEMP/build-result.md"
