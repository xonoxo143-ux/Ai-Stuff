name: Build LocalAI Requested APK
run-name: Build LocalAI Requested APK #${{ github.run_number }}

on:
  push:
    branches:
      - main
    paths:
      - '.applab/localai-apk-request.json'
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or ref to build
        required: true
        default: TEST-2
        type: string
      reason:
        description: Build reason
        required: false
        default: manual LocalAI APK build
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: localai-requested-apk
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build requested LocalAI APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[apk]')

    steps:
      - name: Checkout request source
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 2

      - name: Resolve request
        id: request
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_TARGET_REF: ${{ github.event.inputs.target_ref || '' }}
          MANUAL_REASON: ${{ github.event.inputs.reason || '' }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            target_ref="$MANUAL_TARGET_REF"
            reason="$MANUAL_REASON"
            request_file="manual workflow_dispatch input"
          else
            python3 - <<'PY' > "$RUNNER_TEMP/localai_request.env"
          import json, os, shlex
          from pathlib import Path
          request_path = Path('.applab/localai-apk-request.json')
          if not request_path.exists():
              raise SystemExit('Missing .applab/localai-apk-request.json')
          data = json.loads(request_path.read_text())
          target_ref = data.get('target_ref', 'TEST-2')
          reason = data.get('reason', 'file-triggered LocalAI APK build')
          if not isinstance(target_ref, str) or not target_ref.strip():
              raise SystemExit('target_ref must be a non-empty string')
          if not isinstance(reason, str):
              reason = 'file-triggered LocalAI APK build'
          values = {
              'target_ref': target_ref.strip(),
              'reason': reason.strip(),
              'request_file': request_path.as_posix(),
          }
          for key, value in values.items():
              print(f'{key}={shlex.quote(value)}')
          PY
            source "$RUNNER_TEMP/localai_request.env"
          fi
          echo "target_ref=$target_ref" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "request_file=$request_file" >> "$GITHUB_OUTPUT"
          {
            echo "# LocalAI requested APK"
            echo
            echo "- Target ref: $target_ref"
            echo "- Reason: $reason"
            echo "- Request file: $request_file"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout target app branch
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.request.outputs.target_ref }}
          fetch-depth: 0

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          safe_ref="$(printf '%s' "${{ steps.request.outputs.target_ref }}" | tr '/[:space:]' '-' | tr -cd '[:alnum:]._-' )"
          if [[ -z "$safe_ref" ]]; then
            echo "Could not derive safe ref." >&2
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          version_name="0.1.0-${safe_ref}-r${GITHUB_RUN_NUMBER}-${short_sha}"
          release_tag="android-${safe_ref}-latest"
          stable_apk_name="LocalAI-Lab-debug-latest.apk"
          echo "safe_ref=$safe_ref" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "stable_apk_name=$stable_apk_name" >> "$GITHUB_OUTPUT"
          echo "LOCALAI_BUILD_VERSION=$version_name" >> "$GITHUB_ENV"
          {
            echo ""
            echo "## Target metadata"
            echo "- Target ref: ${{ steps.request.outputs.target_ref }}"
            echo "- Target commit: $source_sha"
            echo "- Version: $version_name"
            echo "- Release tag: $release_tag"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "build-tools;35.0.0" "platforms;android-35"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon assembleDebug

      - name: Locate APK
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          if [[ -z "$apk_path" ]]; then
            echo "No APK found." >&2
            exit 1
          fi
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "Located APK: $apk_path" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify APK archive
        shell: bash
        run: unzip -t "${{ steps.locate.outputs.apk_path }}"

      - name: Package APK
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          archive_apk="artifacts/LocalAI-Lab-${{ steps.meta.outputs.safe_ref }}-${{ steps.meta.outputs.version_name }}.apk"
          stable_apk="artifacts/${{ steps.meta.outputs.stable_apk_name }}"
          cp "${{ steps.locate.outputs.apk_path }}" "$archive_apk"
          cp "$archive_apk" "$stable_apk"
          sha256sum "$archive_apk" > "${archive_apk}.sha256"
          sha256sum "$stable_apk" > "${stable_apk}.sha256"
          apk_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.meta.outputs.release_tag }}/${{ steps.meta.outputs.stable_apk_name }}"
          {
            echo "# LocalAI Lab APK"
            echo
            echo "- Target ref: ${{ steps.request.outputs.target_ref }}"
            echo "- Target commit: ${{ steps.meta.outputs.source_sha }}"
            echo "- Version: ${{ steps.meta.outputs.version_name }}"
            echo "- Build type: debug"
            echo "- Direct APK file: $apk_url"
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Use the direct APK file, not Actions artifacts."
          } > artifacts/RELEASE_NOTES.md
          echo "archive_apk=$archive_apk" >> "$GITHUB_OUTPUT"
          echo "stable_apk=$stable_apk" >> "$GITHUB_OUTPUT"
          echo "apk_url=$apk_url" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact backup
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: localai-lab-${{ steps.meta.outputs.safe_ref }}-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest APK release
        id: release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.release_tag }}
          commit: ${{ steps.meta.outputs.source_sha }}
          name: LocalAI Lab APK Latest (${{ steps.request.outputs.target_ref }})
          bodyFile: artifacts/RELEASE_NOTES.md
          prerelease: true
          allowUpdates: true
          updateOnlyUnreleased: true
          replacesArtifacts: true
          artifacts: |
            ${{ steps.package.outputs.archive_apk }}
            ${{ steps.package.outputs.archive_apk }}.sha256
            ${{ steps.package.outputs.stable_apk }}
            ${{ steps.package.outputs.stable_apk }}.sha256

      - name: Create or find delivery issue
        id: issue
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="LocalAI Lab APK delivery"
          issue_number="$(gh issue list --state open --search "$title in:title" --json number,title --jq '.[] | select(.title == "'"$title"'") | .number' | head -n 1)"
          if [[ -z "$issue_number" ]]; then
            issue_url="$(gh issue create --title "$title" --body "This issue receives LocalAI Lab APK links from GitHub Actions." --assignee xonoxo143-ux)"
            issue_number="${issue_url##*/}"
          fi
          echo "number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "Delivery issue: #$issue_number" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify with APK link
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/localai-apk-comment.md" <<EOF
          @xonoxo143-ux

          APK ready.

          Direct APK file:
          ${{ steps.package.outputs.apk_url }}

          Target ref: ${{ steps.request.outputs.target_ref }}
          Version: ${{ steps.meta.outputs.version_name }}
          Commit: ${{ steps.meta.outputs.source_sha }}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Use this direct APK file, not Actions artifacts.
          EOF
          gh issue comment "${{ steps.issue.outputs.number }}" --body-file "$RUNNER_TEMP/localai-apk-comment.md"

      - name: Publish summary
        shell: bash
        run: |
          {
            echo ""
            echo "## APK delivery"
            echo "- Direct APK file: ${{ steps.package.outputs.apk_url }}"
            echo "- Release: ${{ steps.release.outputs.html_url }}"
            echo "- Delivery issue: #${{ steps.issue.outputs.number }}"
          } >> "$GITHUB_STEP_SUMMARY"
