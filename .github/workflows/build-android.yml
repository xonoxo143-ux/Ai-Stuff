name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - local-ai-workbench
    paths:
      - "app/**"
      - "android-plugin/**"
      - "scripts/**"
      - ".github/workflows/build-android.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "android-plugin/**"
      - "scripts/**"
      - ".github/workflows/build-android.yml"

permissions:
  contents: read

concurrency:
  group: local-ai-workbench-android-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      GODOT_VERSION: "4.5.1"
      GODOT_TEMPLATE_VERSION: "4.5.1.stable"
      ANDROID_NDK_VERSION: "28.1.13356709"
      ANDROID_CMAKE_VERSION: "3.22.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate model catalogue
        run: python3 scripts/validate_catalog.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "cmdline-tools;latest" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build LocalAI Android plugin
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-plugin --no-daemon --console=plain --warning-mode=none :plugin:assembleDebug
          mkdir -p app/addons/LocalAI/bin/debug
          cp android-plugin/plugin/build/outputs/aar/LocalAI-debug.aar \
             app/addons/LocalAI/bin/debug/LocalAI-debug.aar

      - name: Download Godot and export templates
        shell: bash
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d templates-temp
          cp -r templates-temp/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Create debug keystore
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "$HOME/.android/debug.keystore" \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000

      - name: Configure, install template, and export APK
        shell: bash
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /home/runner/.android/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          set -euo pipefail
          mkdir -p app/build
          godot --headless --path app --import

          python3 - <<'PY'
          import os
          import pathlib
          import re

          settings = pathlib.Path.home() / ".config/godot/editor_settings-4.5.tres"
          text = settings.read_text(encoding="utf-8")
          values = {
              "export/android/android_sdk_path": os.environ["ANDROID_SDK_ROOT"],
              "export/android/java_sdk_path": os.environ["JAVA_HOME"],
              "export/android/debug_keystore": str(pathlib.Path.home() / ".android/debug.keystore"),
              "export/android/debug_keystore_user": "androiddebugkey",
              "export/android/debug_keystore_pass": "android",
          }
          for key, value in values.items():
              line = f'{key} = "{value}"'
              pattern = rf'^{re.escape(key)}\s*=.*$'
              if re.search(pattern, text, flags=re.MULTILINE):
                  text = re.sub(pattern, line, text, flags=re.MULTILINE)
              else:
                  text = text.rstrip() + "\n" + line + "\n"
          settings.write_text(text, encoding="utf-8")
          PY

          godot --headless --verbose --path app --install-android-build-template --quit
          test -f app/android/build/build.gradle
          godot --headless --verbose --path app \
            --export-debug "Android" "build/LocalAIWorkbench-debug.apk"
          test -f app/build/LocalAIWorkbench-debug.apk
          unzip -t app/build/LocalAIWorkbench-debug.apk

      - name: Verify packaged native backend
        shell: bash
        run: |
          unzip -l app/build/LocalAIWorkbench-debug.apk | tee apk-contents.txt
          grep -q "lib/arm64-v8a/liblocal_ai.so" apk-contents.txt

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/LocalAIWorkbench-debug.apk dist/LocalAIWorkbench-debug.apk
          cp app/addons/LocalAI/bin/debug/LocalAI-debug.aar dist/
          sha256sum dist/LocalAIWorkbench-debug.apk > dist/LocalAIWorkbench-debug.apk.sha256

      - name: Upload APK and plugin
        uses: actions/upload-artifact@v4
        with:
          name: LocalAIWorkbench-Android
          path: dist/*
          if-no-files-found: error
          retention-days: 30
