name: Coding AI Pages

on:
  push:
    branches:
      - CODING-AI
    paths:
      - ".github/workflows/pages.yml"
      - ".github/scripts/generate-coding-ai-page.sh"
      - "pages_src/**"
      - "project_docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Pages tester
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: CODING-AI

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate static site
        shell: bash
        env:
          SITE_DIR: site
          SOURCE_DIR: pages_src
        run: |
          chmod +x ./.github/scripts/generate-coding-ai-page.sh
          ./.github/scripts/generate-coding-ai-page.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
